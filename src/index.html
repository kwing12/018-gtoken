<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Ví Trung Tâm v1.3</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f0f3f9;--sf:#ffffff;--sf2:#f4f7fe;--bd:#dce4f0;--tx:#1a2640;--dim:#8899b4;
  --grn:#0d9476;--red:#dc2626;--gld:#c9860c;--orn:#e06030;--pur:#7c3aed;
  --hdbg:rgba(240,243,249,.96);--moBg:rgba(0,0,0,.5);--shd1:rgba(0,0,0,.06);--shd2:rgba(0,0,0,.18);
  --radius-card:14px;--gap-list:8px
}
html.dark{
  --bg:#090d14;--sf:#111827;--sf2:#192236;--bd:#1e2d42;--tx:#dce8f5;--dim:#4e6077;
  --grn:#22d3ae;--red:#f87171;--gld:#f5c842;--orn:#fb923c;--pur:#a78bfa;
  --hdbg:rgba(9,13,20,.97);--moBg:rgba(0,0,0,.8);--shd1:rgba(0,0,0,.25);--shd2:rgba(0,0,0,.55)
}
body{font-family:-apple-system,'Helvetica Neue',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden;padding-bottom:env(safe-area-inset-bottom,24px)}
/* HEADER */
.hd{position:sticky;top:0;z-index:50;background:var(--hdbg);-webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);padding:9px 13px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bd)}
.hd-l{display:flex;align-items:center;gap:7px}
.hd h1{font-size:13px;font-weight:900;letter-spacing:2.5px;color:var(--gld)}
.rnd{font-size:10px;font-weight:700;padding:3px 9px;background:var(--sf2);border:1px solid var(--bd);border-radius:20px;color:var(--dim);cursor:pointer;-webkit-user-select:none;user-select:none}
.rnd b{color:var(--gld)}
.hd-r{display:flex;gap:4px}
.ib{width:32px;height:32px;border-radius:9px;background:var(--sf2);border:1px solid var(--bd);color:var(--dim);font-size:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.ib:active{transform:scale(.88)}
.ib.hot{color:var(--gld);border-color:rgba(201,134,12,.4)}
html.dark .ib.hot{color:var(--gld);border-color:rgba(245,200,66,.4)}
/* CHECKSUM */
.ckb{padding:4px 13px;background:var(--sf);border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;font-size:10px;font-weight:700;font-family:monospace;color:var(--dim)}
.ok{color:var(--grn)}.er{color:var(--red)}
/* PLAYER CARDS */
.pls{padding:10px 11px;display:flex;flex-direction:column;gap:var(--gap-list)}
.pc{background:var(--sf);border:1px solid var(--bd);border-radius:var(--radius-card);display:flex;align-items:stretch;overflow:hidden;box-shadow:0 2px 8px var(--shd1)}
.pc:active{transform:scale(.985)}
.pc.warn{border-color:rgba(224,96,48,.45)}
.pc.bust{border-color:rgba(220,38,38,.5);box-shadow:0 0 14px rgba(220,38,38,.1)}
html.dark .pc.bust{box-shadow:0 0 14px rgba(248,113,113,.15)}
.stripe{width:4px;flex-shrink:0}
.pc-body{flex:1;display:flex;align-items:center;gap:10px;padding:11px 10px;cursor:pointer}
.av{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:16px;color:#fff;flex-shrink:0}
.av.em{font-size:22px;background:transparent!important;filter:drop-shadow(0 1px 2px rgba(0,0,0,.2))}
.inf{flex:1;min-width:0}
.nm{font-size:13px;font-weight:600;display:flex;align-items:center;gap:5px;white-space:nowrap;overflow:hidden}
.tag{font-size:9px;padding:1px 5px;border-radius:4px;font-weight:700;flex-shrink:0}
.bal{font-family:monospace;font-size:19px;font-weight:800;margin-top:1px;letter-spacing:-.5px}
.pc.warn .bal{animation:blink 2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.6}}
.pc-r{display:flex;flex-direction:column;align-items:flex-end;justify-content:center;gap:5px;padding:10px 10px 10px 0}
.dl{font-family:monospace;font-size:10px;font-weight:700;padding:2px 6px;border-radius:5px;white-space:nowrap}
.dp{background:rgba(13,148,118,.12);color:var(--grn)}
.dn{background:rgba(220,38,38,.1);color:var(--red)}
.dz{background:rgba(136,153,180,.12);color:var(--dim)}
html.dark .dp{background:rgba(34,211,174,.13)}html.dark .dn{background:rgba(248,113,113,.13)}
.qa-r{display:flex;gap:4px}
.qa{width:26px;height:26px;border-radius:7px;background:var(--sf2);border:1px solid var(--bd);font-size:13px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.qa:active{transform:scale(.78)}
.qa.qs{color:var(--red);border-color:rgba(220,38,38,.25)}
.qa.qr{color:var(--grn);border-color:rgba(13,148,118,.25)}
html.dark .qa.qs{border-color:rgba(248,113,113,.3)}html.dark .qa.qr{border-color:rgba(34,211,174,.3)}
/* HISTORY */
.hs{padding:2px 11px 16px}
.hs-hd{font-size:10px;color:var(--dim);margin-bottom:5px;text-transform:uppercase;letter-spacing:1px}
.hl{max-height:130px;overflow-y:auto;display:flex;flex-direction:column;gap:2px}
.hi{font-size:10px;padding:4px 8px;background:var(--sf);border-radius:6px;font-family:monospace;color:var(--dim);line-height:1.4}
/* MODAL */
.mo{position:fixed;inset:0;z-index:100;background:var(--moBg);-webkit-backdrop-filter:blur(5px);backdrop-filter:blur(5px);display:flex;align-items:flex-end;justify-content:center}
.md{background:var(--sf);border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;padding:16px 14px 32px;animation:su .2s cubic-bezier(.25,.8,.25,1)}
@keyframes su{from{transform:translateY(100%);opacity:.4}}
.mh{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px}
.mh h2{font-size:16px;font-weight:700;display:flex;align-items:center;gap:8px}
.mc{width:30px;height:30px;border-radius:50%;background:var(--sf2);border:none;color:var(--dim);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
/* MODAL TABS */
.mtabs{display:flex;gap:3px;background:var(--bg);border-radius:10px;padding:3px;margin-bottom:12px}
.mtab{flex:1;padding:8px;border-radius:7px;border:none;background:transparent;color:var(--dim);font-size:13px;font-weight:700;cursor:pointer;transition:background .12s,color .12s}
.mtab.on{background:var(--sf2);color:var(--tx)}
/* QUICK ROW */
.qrow{display:flex;gap:4px;margin-bottom:12px}
.qrb{flex:1;padding:8px 2px;border-radius:9px;background:var(--sf2);border:1.5px solid var(--bd);font-family:monospace;font-size:12px;font-weight:700;cursor:pointer;transition:all .1s}
.qrb:active{transform:scale(.9)}
.qrb.qs{border-color:rgba(220,38,38,.35);color:var(--red)}
.qrb.qr{border-color:rgba(13,148,118,.35);color:var(--grn)}
html.dark .qrb.qs{border-color:rgba(248,113,113,.4)}html.dark .qrb.qr{border-color:rgba(34,211,174,.4)}
/* AMOUNT GRID */
.slbl{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.ag{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:8px}
.ab{padding:11px 0;border-radius:10px;background:var(--sf2);border:1.5px solid var(--bd);color:var(--tx);font-family:monospace;font-size:13px;font-weight:700;cursor:pointer;transition:all .1s}
.ab:active{transform:scale(.92)}
.ab.sel{border-color:var(--gld);background:rgba(201,134,12,.08);color:var(--gld)}
html.dark .ab.sel{background:rgba(245,200,66,.1)}
.ca{display:flex;gap:8px;margin-bottom:12px;align-items:center}
.ca input{flex:1;padding:8px 10px;border-radius:9px;background:var(--bg);border:1px solid var(--bd);color:var(--tx);font-family:monospace;font-size:14px;outline:none}
.ca input:focus{border-color:var(--gld)}
.ca span{color:var(--dim);font-size:11px;white-space:nowrap}
/* TARGET LIST */
.albt{width:100%;padding:8px;border-radius:9px;background:var(--sf2);border:1.5px solid var(--bd);color:var(--tx);font-size:12px;font-weight:700;cursor:pointer;margin-bottom:6px;transition:all .1s}
.albt:active{transform:scale(.98)}
.albt.sel{border-color:var(--gld);color:var(--gld);background:rgba(201,134,12,.07)}
html.dark .albt.sel{background:rgba(245,200,66,.08)}
.tg{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.tr{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:9px;background:var(--bg);cursor:pointer;border:1.5px solid transparent;transition:all .1s}
.tr:active{transform:scale(.98)}
.tr.sel{border-color:var(--gld);background:rgba(201,134,12,.04)}
html.dark .tr.sel{background:rgba(245,200,66,.04)}
.av2{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#fff;flex-shrink:0}
.av2.em{font-size:16px;background:transparent!important}
.tn{flex:1;font-size:13px;font-weight:500}
.tb{font-size:11px;color:var(--dim);font-family:monospace}
.ck2{font-size:14px;color:var(--gld);opacity:0;transition:opacity .1s}
.tr.sel .ck2{opacity:1}
/* ERROR MSG */
.errmsg{display:none;color:var(--red);background:rgba(220,38,38,.08);border:1px solid rgba(220,38,38,.2);border-radius:8px;padding:8px 10px;margin-bottom:10px;font-size:12px;text-align:center;font-weight:600}
html.dark .errmsg{background:rgba(248,113,113,.1)}
/* EXEC BUTTON */
.exb{width:100%;padding:13px;border-radius:12px;border:none;font-size:14px;font-weight:800;cursor:pointer;transition:opacity .15s;letter-spacing:.3px}
.exb:disabled{opacity:.3}
.exb:active:not(:disabled){transform:scale(.97)}
.exb.s{background:var(--red);color:#fff}
.exb.r{background:var(--grn);color:#fff}
html.dark .exb.r{color:#000}
/* SETUP */
.srow{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--bd)}
.srow:last-child{border-bottom:none}
.sav{width:34px;height:34px;border-radius:10px;cursor:pointer;flex-shrink:0;border:2px solid var(--bd);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:15px;color:#fff;transition:transform .1s}
.sav:active{transform:scale(.82)}
.sav.em{font-size:22px;border-color:var(--bd)}
.snm{flex:1;padding:7px 9px;border-radius:8px;background:var(--bg);border:1px solid var(--bd);color:var(--tx);font-size:13px;outline:none}
.snm:focus{border-color:var(--gld)}
.sbal{width:60px;padding:7px 5px;border-radius:8px;background:var(--bg);border:1px solid var(--bd);color:var(--tx);font-size:13px;text-align:right;outline:none;font-family:monospace}
.sbal:focus{border-color:var(--gld)}
.sdim{color:var(--dim);font-size:11px}
.sbt{width:100%;padding:13px;border-radius:12px;border:none;background:var(--gld);color:#fff;font-size:15px;font-weight:800;cursor:pointer;margin-top:14px;letter-spacing:.5px}
html.dark .sbt{color:#000}
.sbt:active{transform:scale(.97)}
/* PICKER PANEL */
.pkp{background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:10px 12px;margin-top:4px}
.pkp .pk-lbl{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.clrs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.cpd{width:26px;height:26px;border-radius:50%;border:2.5px solid transparent;cursor:pointer;transition:transform .1s}
.cpd.on{border-color:var(--tx);transform:scale(1.18)}
.emjs{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px}
.emj{width:32px;height:32px;border-radius:8px;border:1.5px solid var(--bd);background:var(--sf2);display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;transition:transform .1s}
.emj:active{transform:scale(.85)}
.emj.on{border-color:var(--gld)}
/* UNDO BAR */
.ub{position:fixed;bottom:calc(18px + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%);z-index:90;background:var(--sf);border:1px solid var(--bd);border-radius:13px;padding:7px 12px;display:flex;align-items:center;gap:9px;animation:pop .18s ease-out;box-shadow:0 4px 24px var(--shd2);max-width:95vw}
@keyframes pop{from{opacity:0;transform:translateX(-50%) translateY(6px)}}
.ub span{font-size:10px;color:var(--dim);font-family:monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:190px}
.ub button{padding:5px 12px;border-radius:7px;border:none;background:var(--gld);color:#fff;font-size:11px;font-weight:800;cursor:pointer;flex-shrink:0}
html.dark .ub button{color:#000}
/* SESSION HISTORY */
.ss{padding:10px;border-radius:10px;background:var(--bg);margin-bottom:6px}
.ss .sd{font-size:10px;color:var(--dim);margin-bottom:4px}
.ss .sr{display:flex;flex-wrap:wrap;gap:3px}
.sc2{font-size:10px;padding:2px 7px;border-radius:4px;font-family:monospace;font-weight:700}
/* RESET OPTIONS */
.ropt{width:100%;padding:12px 14px;border-radius:11px;border:1px solid var(--bd);background:var(--sf2);color:var(--tx);font-size:13px;font-weight:600;cursor:pointer;text-align:left;margin-bottom:7px;display:flex;align-items:flex-start;gap:11px}
.ropt:active{transform:scale(.98)}
.ropt .ico{font-size:18px;flex-shrink:0;margin-top:1px}
.ropt .rdesc{font-size:11px;color:var(--dim);font-weight:400;margin-top:2px;line-height:1.4}
.ropt.dng{border-color:rgba(220,38,38,.3);color:var(--red)}
.note{padding:4px 13px;font-size:11px;color:var(--dim);border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--sf)}
.timer-btn{padding:3px 8px;border:1px solid var(--bd);border-radius:14px;background:var(--sf2);font-family:monospace;font-size:11px;font-weight:700;cursor:pointer;color:var(--dim)}
.timer-btn.run{color:var(--grn);border-color:rgba(13,148,118,.3)}
.timer-btn.pause{color:var(--orn)}
.pc.compact .pc-body{padding:8px 8px;gap:8px}
.pc.compact .av{width:30px;height:30px;border-radius:9px;font-size:13px}
.pc.compact .bal{font-size:16px}
.pc.compact .tag{font-size:8px}
.pc.mini{--radius-card:8px}
.pc.mini .stripe{width:3px}
.pc.mini .pc-body{padding:8px 7px;gap:7px}
.pc.mini .av{width:26px;height:26px;border-radius:8px;font-size:12px}
.pc.mini .nm{font-size:12px}
.pc.mini .bal{font-size:14px}
.pc.mini .pc-r{padding:8px 8px 8px 0}
.pc.mini .qa-r{display:none}
.rank-badge{font-size:10px;padding:1px 5px;border-radius:4px;background:var(--sf2);color:var(--dim);border:1px solid var(--bd)}
.toast-wrap{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(70px + env(safe-area-inset-bottom,0px));z-index:91;display:flex;flex-direction:column;gap:6px;max-width:92vw}
.toast{padding:8px 11px;border-radius:10px;background:var(--sf);border:1px solid var(--bd);font-size:12px;box-shadow:0 4px 20px var(--shd2)}
.pc-ctl{display:flex;align-items:center;justify-content:center;gap:8px;background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:8px;margin-bottom:12px}
.pc-step{width:32px;height:32px;border-radius:9px;background:var(--sf2);border:1px solid var(--bd);font-size:18px;cursor:pointer;color:var(--tx)}
.pc-num{min-width:72px;text-align:center;font-family:monospace;font-size:22px;font-weight:900;color:var(--gld)}
@media (min-width: 640px){
  .mo{align-items:center}
  .md{border-radius:20px;max-width:520px;max-height:85vh;margin:auto;animation:fadeScale .18s ease-out}
  @keyframes fadeScale{from{opacity:0;transform:scale(.94)}}
  .pls{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .hd h1{font-size:16px}
  .ib{width:auto;padding:0 12px;gap:5px;font-size:12px}
}
@media (min-width: 1024px){
  .pls{grid-template-columns:1fr 1fr 1fr}
}
/* UNDO HISTORY */
.uhrow{display:flex;align-items:center;gap:7px;padding:7px 9px;background:var(--bg);border-radius:8px;margin-bottom:4px}
.uhnum{font-size:10px;color:var(--dim);width:18px;text-align:right;flex-shrink:0;font-family:monospace}
.uhtxt{flex:1;font-size:11px;font-family:monospace;color:var(--tx);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.uhtime{font-size:10px;color:var(--dim);flex-shrink:0}
/* STATS */
.stat-r{display:flex;align-items:center;gap:10px;padding:9px 10px;background:var(--bg);border-radius:10px;margin-bottom:5px}
.stat-av{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;color:#fff;flex-shrink:0}
.stat-av.em{font-size:20px;background:transparent!important}
.stat-nm{font-size:13px;font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.stat-col{text-align:right;font-family:monospace;font-size:11px;font-weight:700;min-width:52px}
.stat-hd{display:flex;gap:10px;padding:0 10px 4px;font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px}
/* QUICK DENOM SETUP */
.qd-row{display:flex;gap:6px;margin-bottom:10px}
.qdinp{flex:1;padding:6px 4px;border-radius:8px;background:var(--bg);border:1px solid var(--bd);color:var(--tx);font-size:12px;text-align:center;outline:none;font-family:monospace}
.qdinp:focus{border-color:var(--gld)}
/* SCROLLBAR */
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
/* BTN UTIL */
.btn-ghost{width:100%;padding:9px;border-radius:9px;background:transparent;border:1px solid var(--bd);color:var(--dim);font-size:12px;cursor:pointer;margin-top:4px}
.btn-ghost:active{transform:scale(.98)}
.btn-ghost.dng{border-color:rgba(220,38,38,.4);color:var(--red)}
</style>
</head>
<body>
<div id="app"></div>
<div id="modal-root"></div>
<div id="undo-root"></div>
<script>
var EMOJIS=['😀','😎','🤩','😈','🦁','🐯','🦊','🐺','🐻','🐼','🦄','🐲','🔥','⚡','💎','👑','🎯','🎲','🃏','⭐'];
var COLS=['#ef4444','#3b82f6','#22d3ae','#f5c842','#a78bfa','#ec4899','#f97316','#84cc16'];
var DENOMS=[1000,2000,5000,10000,20000,50000];
var DBAL=100000;
var timerInterval=null;
var toastTimer=null;

function mkPlayers(n){var a=[];for(var i=0;i<n;i++)a.push({name:'Người chơi '+(i+1),color:COLS[i%COLS.length],emoji:'',balance:DBAL,initial:DBAL});return a}
function normState(sv){
  if(!sv||!sv.players||sv.players.length<2)return null;
  var s=sv;
  s.modal=null;s.ap=null;s.atab='send';s.aamt=0;s.atgt=[];s.undoTimer=null;
  if(!s.quickDenoms)s.quickDenoms=[1000,2000,5000,10000];
  if(!s.hist)s.hist=[];if(!s.sessions)s.sessions=[];
  if(typeof s.round==='undefined')s.round=1;
  if(typeof s.sortDesc==='undefined')s.sortDesc=false;
  if(typeof s.pot==='undefined')s.pot=0;
  if(typeof s.potEnabled==='undefined')s.potEnabled=false;
  if(!s.timer)s.timer={startMs:0,elapsed:0,running:false};
  if(typeof s.pinnedNote==='undefined')s.pinnedNote='';
  if(typeof s.theme==='undefined')s.theme=(s.dark?'dark':'auto');
  if(typeof s.compact==='undefined')s.compact=false;
  if(typeof s.autoTimerStart==='undefined')s.autoTimerStart=false;
  if(typeof s.showRanks==='undefined')s.showRanks=false;
  if(typeof s.showTimerAlways==='undefined')s.showTimerAlways=false;
  if(typeof s.soundEnabled==='undefined')s.soundEnabled=true;
  if(typeof s.vibrateEnabled==='undefined')s.vibrateEnabled=true;
  if(!s.txTemplates)s.txTemplates=[];
  if(!s.histFilter)s.histFilter=-1;
  if(typeof s.hidePinned==='undefined')s.hidePinned=false;
  for(var i=0;i<s.players.length;i++){
    if(typeof s.players[i].emoji==='undefined')s.players[i].emoji='';
    if(!s.players[i].name)s.players[i].name='Người chơi '+(i+1);
  }
  return s;
}
var S=null;
try{S=normState(JSON.parse(localStorage.getItem('wc_v13')||'null'))}catch(e){}
if(!S){

/* ===== UTILS ===== */
function fmt(n){var a=n<0?-n:n;if(a>=1000000)return(n/1000000).toFixed(a%1000000===0?0:1)+'M';if(a>=1000)return(n/1000).toFixed(a%1000===0?0:1)+'k';return''+n}
function ff(n){return n.toLocaleString('vi-VN')+'d'}
function tnow(){return new Date().toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}
function totBal(){var t=0;for(var i=0;i<S.players.length;i++)t+=S.players[i].balance;return t}
function totInit(){var t=0;for(var i=0;i<S.players.length;i++)t+=S.players[i].initial;return t}
function $(id){return document.getElementById(id)}
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function vib(p){if(!S.vibrateEnabled)return;try{if(navigator.vibrate)navigator.vibrate(p)}catch(e){}}
function coin(tp){if(!S.soundEnabled)return;try{var A=window.AudioContext||window.webkitAudioContext;if(!A)return;var ctx=new A();var o=ctx.createOscillator();var g=ctx.createGain();o.connect(g);g.connect(ctx.destination);if(tp==='s'){o.frequency.setValueAtTime(600,ctx.currentTime);o.frequency.exponentialRampToValueAtTime(300,ctx.currentTime+.15)}else{o.frequency.setValueAtTime(330,ctx.currentTime);o.frequency.exponentialRampToValueAtTime(660,ctx.currentTime+.15)}g.gain.setValueAtTime(.12,ctx.currentTime);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.18);o.start();o.stop(ctx.currentTime+.2)}catch(e){}}
function avHtml(p,cls,sz){var c=cls||'av';var s=sz?'font-size:'+sz+'px;':'';if(p.emoji)return '<div class="'+c+' em" style="'+s+'">'+p.emoji+'</div>';return '<div class="'+c+'" style="background:'+p.color+';'+s+'">'+esc(p.name.charAt(0).toUpperCase())+'</div>'}
function rankAt(i){var arr=[];for(var k=0;k<S.players.length;k++)arr.push(k);arr.sort(function(a,b){return S.players[b].balance-S.players[a].balance});for(var j=0;j<arr.length;j++){if(arr[j]===i)return j+1}return 99}
function rankLabel(r){if(r===1)return '🥇';if(r===2)return '🥈';if(r===3)return '🥉';return '#'+r}
function cardMode(){var n=S.players.length;if(n>=15)return 'mini';if(S.compact||n>=9)return 'compact';return 'full'}
function fmt2(n){return (n<10?'0':'')+n}
function getElapsed(){var e=S.timer.elapsed;if(S.timer.running)e+=Date.now()-S.timer.startMs;return e}
function fmtTime(ms){var s=Math.floor(ms/1000);var h=Math.floor(s/3600);var m=Math.floor((s%3600)/60);var sec=s%60;if(h>0)return h+':'+fmt2(m)+':'+fmt2(sec);return fmt2(m)+':'+fmt2(sec)}
function startTimer(){S.timer.startMs=Date.now();S.timer.running=true}
function pauseTimer(){if(S.timer.running){S.timer.elapsed+=Date.now()-S.timer.startMs;S.timer.running=false;S.timer.startMs=0}}
function resumeTimer(){S.timer.startMs=Date.now();S.timer.running=true}
function resetTimer(){S.timer={startMs:0,elapsed:0,running:false}}
function toggleTimer(){if(S.timer.running)pauseTimer();else resumeTimer();saveState();render()}
function startTimerTick(){if(timerInterval)clearInterval(timerInterval);timerInterval=setInterval(function(){if(S.phase==='playing'&&S.timer.running)updateTimerDisplay()},1000)}
function updateTimerDisplay(){var el=$('timerEl');if(el)el.textContent=fmtTime(getElapsed())}
function pushToast(msg){clearTimeout(toastTimer);var wr=$('toast-root');if(!wr)return;wr.innerHTML='<div class="toast">'+esc(msg)+'</div>';toastTimer=setTimeout(function(){if(wr)wr.innerHTML=''},3000)}
function applyTheme(){var dark=false;if(S.theme==='dark')dark=true;else if(S.theme==='auto'){try{dark=window.matchMedia('(prefers-color-scheme: dark)').matches}catch(e){dark=false}}if(dark)document.documentElement.classList.add('dark');else document.documentElement.classList.remove('dark')}

/* ===== SAVE ===== */
function saveState(){try{pauseTimer();var o={phase:S.phase,players:S.players,hist:S.hist,sessions:S.sessions,quickDenoms:S.quickDenoms,undoStack:S.undoStack,round:S.round,sortDesc:S.sortDesc,pot:S.pot,potEnabled:S.potEnabled,timer:S.timer,pinnedNote:S.pinnedNote,theme:S.theme,compact:S.compact,autoTimerStart:S.autoTimerStart,showRanks:S.showRanks,showTimerAlways:S.showTimerAlways,soundEnabled:S.soundEnabled,vibrateEnabled:S.vibrateEnabled,txTemplates:S.txTemplates,histFilter:S.histFilter,hidePinned:S.hidePinned};localStorage.setItem('wc_v13',JSON.stringify(o))}catch(e){}}

/* ===== RENDER ===== */
function render(){var a=$('app');if(S.phase==='setup')a.innerHTML=rSetup();else a.innerHTML=rPlay();saveState()}

/* ===== THEME TOGGLE ===== */
function toggleTheme(){if(S.theme==='auto')S.theme='dark';else if(S.theme==='dark')S.theme='light';else S.theme='auto';applyTheme();saveState();render()}

/* ===== PLAY ===== */
function rPlay(){
  var tot=totBal()+S.pot,ti=totInit()+S.pot,ok=(tot===ti),undoCnt=S.undoStack.length,mode=cardMode();
  var h='<div class="hd"><div class="hd-l"><h1>VÍ TRUNG TÂM</h1>';
  h+='<div class="rnd" onclick="incRound()">Vòng <b>'+S.round+'</b></div></div>';
  h+='<div class="hd-r">';
  h+='<button class="ib'+(undoCnt>0?' hot':'')+'" onclick="showUndoHist()" title="Hoàn tác">↺'+(undoCnt>0?' '+undoCnt:'')+'</button>';
  h+='<button class="ib'+(S.sortDesc?' hot':'')+'" onclick="toggleSort()" title="Sắp xếp">⇅</button>';
  h+='<button class="ib'+(S.compact?' hot':'')+'" onclick="toggleCompact()" title="Chế độ gọn">'+(S.compact?'≡':'⊞')+'</button>';
  h+='<button class="ib" onclick="showSettings()" title="Cài đặt">⚙</button>';
  h+='<button class="ib" onclick="showUndoHist()" title="Lịch sử">📋</button>';
  h+='<button class="ib" onclick="showReset()" title="Đặt lại">⊙</button>';
  h+='</div></div>';
  if(S.pinnedNote&&!S.hidePinned)h+='<div class="note"><span>'+esc(S.pinnedNote)+'</span><button class="mc" style="width:22px;height:22px" onclick="S.hidePinned=true;render()">×</button></div>';
  h+='<div class="ckb"><span>'+S.hist.length+' GD &bull; Tổng: <b style="color:var(--tx)">'+ff(tot)+'</b></span>';
  h+='<span class="'+(ok?'ok':'er')+'">'+(ok?'&#10003; Hợp lệ':'&#10007; LỆCH')+'</span></div>';
  if(S.showTimerAlways||S.timer.running||getElapsed()>0){h+='<div style="padding:7px 13px;border-bottom:1px solid var(--bd);display:flex;justify-content:flex-end"><button id="timerElBtn" class="timer-btn '+(S.timer.running?'run':'pause')+'" onclick="toggleTimer()">'+(S.timer.running?'⏸ ':'▶ ')+'<span id="timerEl">'+fmtTime(getElapsed())+'</span></button></div>'}
  h+='<div class="pls">';
  if(S.potEnabled){h+='<div class="pc compact" onclick="openPotAct()"><div class="stripe" style="background:var(--gld)"></div><div class="pc-body"><div class="av" style="background:var(--gld)">💰</div><div class="inf"><div class="nm">Quỹ chung</div><div class="bal">'+ff(S.pot)+'</div></div></div><div class="pc-r"><div class="dl dz">Quỹ</div></div></div>'}
  var idxs=[];for(var k=0;k<S.players.length;k++)idxs.push(k);
  if(S.sortDesc)idxs.sort(function(a,b){return S.players[b].balance-S.players[a].balance});
  for(var ii=0;ii<idxs.length;ii++){
    var i=idxs[ii];var p=S.players[i];var d=p.balance-p.initial;
    var dc=d>0?'dp':d<0?'dn':'dz';var ds=d>0?'+'+fmt(d):d<0?fmt(d):'0';
    var bust=(p.balance===0);var warn=(!bust&&p.balance<p.initial*.25);
    h+='<div class="pc '+mode+(bust?' bust':warn?' warn':'')+'"><div class="stripe" style="background:'+p.color+'"></div>';
    h+='<div class="pc-body" onclick="openAct('+i+')">';
    h+=avHtml(p,'av');
    h+='<div class="inf"><div class="nm">'+esc(p.name);
    if(S.showRanks){var rk=rankAt(i);h+='<span class="rank-badge">'+rankLabel(rk)+'</span>'}
    if(bust)h+='<span class="tag" style="background:rgba(220,38,38,.1);color:var(--red)">HẾT TIỀN</span>';
    else if(warn)h+='<span class="tag" style="background:rgba(224,96,48,.1);color:var(--orn)">SẮP HẾT</span>';
    h+='</div><div class="bal">'+ff(p.balance)+'</div></div></div>';
    h+='<div class="pc-r"><div class="dl '+dc+'">'+ds+'</div>';
    h+='<div class="qa-r">';
    h+='<div class="qa qs" onclick="openActQ(event,'+i+',\'send\')" title="Gửi cho tất cả">&#8594;</div>';
    h+='<div class="qa qr" onclick="openActQ(event,'+i+',\'receive\')" title="Nhận từ tất cả">&#8592;</div>';
    h+='</div></div></div>'}
  h+='</div><div class="hs"><div class="hs-hd">Giao dịch gần đây</div>';
  h+='<div style="display:flex;gap:4px;overflow:auto;margin-bottom:5px"><button class="btn-ghost" style="margin:0;padding:5px 8px;font-size:10px" onclick="setHistFilter(-1)">Tất cả</button>';
  for(var hf=0;hf<S.players.length;hf++)h+='<button class="btn-ghost" style="margin:0;padding:5px 8px;font-size:10px" onclick="setHistFilter('+hf+')">'+esc(S.players[hf].name)+'</button>';
  h+='</div><div class="hl">';
  if(S.hist.length===0)h+='<div class="hi" style="text-align:center;opacity:.4">Chưa có giao dịch</div>';
  else{var fr=S.hist.length-1;var shown=0;for(var i=fr;i>=0&&shown<50;i--){if(S.histFilter>=0){var e=S.hist[i];if(e.f!==S.histFilter&&e.t.indexOf(S.histFilter)<0)continue}shown++;h+='<div class="hi"><span style="opacity:.4">'+S.hist[i].time+'</span> '+esc(S.hist[i].text)+'</div>'}}
  h+='</div></div><div id="toast-root" class="toast-wrap"></div>';return h}

  for(var i=0;i<S.players.length;i++){if(i===S.ap)continue;var o=S.players[i];
    h+='<div class="tr" data-idx="'+i+'" onclick="togTgt('+i+')">'+avHtml(o,'av2',16)+'<span class="tn">'+esc(o.name)+'</span><span class="tb">'+ff(o.balance)+'</span><span class="ck2">&#10003;</span></div>'}
  h+='</div>';
  h+='<button class="btn-ghost" onclick="saveTpl()">★ Lưu mẫu</button><div class="errmsg" id="errMsg"></div>';
  h+='<button class="exb '+(is?'s':'r')+'" id="btnExec" onclick="execAct()" disabled>'+(is?'GỬI':'NHẬN')+'</button>';
  h+='</div></div>';return h}

/* ===== DOM TARGETED — no re-render, no scroll jump ===== */
function updAmt(){
  var btns=document.querySelectorAll('.ab');
  for(var i=0;i<btns.length;i++){if(parseInt(btns[i].getAttribute('data-amt'),10)===S.aamt)btns[i].classList.add('sel');else btns[i].classList.remove('sel')}
  updBtn()}
function updTgt(){
  var rows=document.querySelectorAll('.tr');
  for(var i=0;i<rows.length;i++){var idx=parseInt(rows[i].getAttribute('data-idx'),10);if(S.atgt.indexOf(idx)>=0)rows[i].classList.add('sel');else rows[i].classList.remove('sel')}
  var others=[];for(var i=0;i<S.players.length;i++){if(i!==S.ap)others.push(i)}if(S.potEnabled&&S.ap!==-1)others.push(-1);
  var ba=$('btnAll');if(ba){if(S.atgt.length===others.length&&others.length>0)ba.classList.add('sel');else ba.classList.remove('sel')}
  updBtn()}
function updBtn(){
  var btn=$('btnExec');if(!btn)return;
  var is=(S.atab==='send');
  btn.disabled=(S.aamt<=0||S.atgt.length===0);
  var lbl=is?'GỬI':'NHẬN';
  if(S.aamt>0&&S.atgt.length>0)lbl+=' '+fmt(S.aamt)+' x '+S.atgt.length+' = '+ff(S.aamt*S.atgt.length);
  btn.textContent=lbl}

/* setTab: PURE DOM, zero scroll jump */
function setTab(t){
  S.atab=t;S.atgt=[];S.aamt=0;var is=(t==='send');
  var t0=$('t0');var t1=$('t1');
  if(t0){if(is)t0.classList.add('on');else t0.classList.remove('on')}
  if(t1){if(!is)t1.classList.add('on');else t1.classList.remove('on')}
  var lbl=$('tgtLbl');if(lbl)lbl.textContent=is?'GỬI CHO':'NHẬN TỪ';
  var ba=$('btnAll');if(ba){ba.textContent=is?'▶ Gửi cho TẤT CẢ':'◀ Nhận từ TẤT CẢ';ba.classList.remove('sel')}
  var exb=$('btnExec');if(exb){exb.classList.remove('s','r');exb.classList.add(is?'s':'r')}
  var qbs=document.querySelectorAll('.qrb');
  for(var i=0;i<qbs.length;i++){qbs[i].classList.remove('qs','qr');qbs[i].classList.add(is?'qs':'qr');qbs[i].textContent=(is?'\u2192':'\u2190')+fmt(S.quickDenoms[i])}
  var ci=$('camt');if(ci)ci.value='';
  updAmt();updTgt()}

function setAmt(a){S.aamt=a;var ci=$('camt');if(ci)ci.value='';updAmt()}
function setCamt(v){var n=parseFloat(v)*1000;S.aamt=(!isNaN(n)&&n>0)?n:0;var btns=document.querySelectorAll('.ab');for(var i=0;i<btns.length;i++)btns[i].classList.remove('sel');updBtn()}
function togTgt(idx){var i=S.atgt.indexOf(idx);if(i>=0)S.atgt.splice(i,1);else S.atgt.push(idx);updTgt()}

/* ===== EXECUTE ===== */
function execAct(){
  var amt=S.aamt,pi=S.ap,p=S.players[pi],is=(S.atab==='send'),tgts=S.atgt.slice();
  if(amt<=0||tgts.length===0)return;
  var srcBal=(pi===-1?S.pot:p.balance);
  if(is){if(srcBal<amt*tgts.length){showErr((pi===-1?'Quỹ chung':p.name)+' không đủ tiền! Thiếu '+ff(amt*tgts.length-srcBal));return}}
  else{for(var i=0;i<tgts.length;i++){if(tgts[i]===-1){if(S.pot<amt){showErr('Quỹ chung không đủ tiền (có '+ff(S.pot)+')');return}}else{var tp=S.players[tgts[i]];if(tp.balance<amt){showErr(tp.name+' không đủ tiền (có '+ff(tp.balance)+')');return}}}}
  var snap=[];for(var i=0;i<S.players.length;i++)snap.push(S.players[i].balance);
  var snapPot=S.pot;
  var names=[];
  if(is){
    if(pi===-1)S.pot-=amt*tgts.length;else p.balance-=amt*tgts.length;
    for(var i=0;i<tgts.length;i++){if(tgts[i]===-1){S.pot+=amt;names.push('Quỹ chung')}else{S.players[tgts[i]].balance+=amt;names.push(S.players[tgts[i]].name)}}
    S.hist.push({time:tnow(),text:(pi===-1?'Quỹ chung':p.name)+' → '+names.join(', ')+': '+ff(amt)+(tgts.length>1?' mỗi người':''),f:pi,t:tgts.slice(),a:amt,tp:'s'})
  }else{
    for(var i=0;i<tgts.length;i++){if(tgts[i]===-1){S.pot-=amt;names.push('Quỹ chung')}else{S.players[tgts[i]].balance-=amt;names.push(S.players[tgts[i]].name)}}
    if(pi===-1)S.pot+=amt*tgts.length;else p.balance+=amt*tgts.length;
    S.hist.push({time:tnow(),text:(pi===-1?'Quỹ chung':p.name)+' ← '+names.join(', ')+': '+ff(amt)+(tgts.length>1?' mỗi người':''),f:pi,t:tgts.slice(),a:amt,tp:'r'})
  }
  S.undoStack.push({snap:snap,snapPot:snapPot,idx:S.hist.length-1});
  if(S.undoStack.length>20)S.undoStack.shift();
  for(var bi=0;bi<S.players.length;bi++){if(S.players[bi].balance===0)pushToast('💥 '+S.players[bi].name+' vừa hết tiền!')}
  var rk=rankAt(S.sortDesc?0:0);if(rk===1&&S.players.length>1)pushToast('🏆 '+S.players[0].name+' đang dẫn đầu!');
  vib(25);coin(is?'s':'r');showUndoBar();clMoF();render()}

/* ===== UNDO ===== */
function showUndoBar(){
  if(S.undoTimer)clearTimeout(S.undoTimer);
  var ur=$('undo-root');
  var txt=S.hist.length>0?S.hist[S.hist.length-1].text:'';
  ur.innerHTML='<div class="ub"><span>'+esc(txt)+'</span><button onclick="doUndo()">HOÀN TÁC</button></div>';
  S.undoTimer=setTimeout(function(){ur.innerHTML=''},6000)}
function doUndo(){
  if(S.undoStack.length===0)return;
  var u=S.undoStack.pop();
  for(var i=0;i<u.snap.length;i++)S.players[i].balance=u.snap[i];
  if(typeof u.snapPot!=='undefined')S.pot=u.snapPot;
  S.hist.splice(u.idx,1);
  $('undo-root').innerHTML='';if(S.undoTimer)clearTimeout(S.undoTimer);
  vib([15,10,15]);render()}

/* ===== STATS ===== */
function calcStats(){
  var s=[];for(var i=0;i<S.players.length;i++)s.push({out:0,inp:0,cnt:0});
  for(var h=0;h<S.hist.length;h++){
    var e=S.hist[h];if(!e.t)continue;
    if(e.tp==='s'){s[e.f].out+=e.a*e.t.length;s[e.f].cnt++;for(var j=0;j<e.t.length;j++)s[e.t[j]].inp+=e.a}
    else if(e.tp==='r'){s[e.f].inp+=e.a*e.t.length;s[e.f].cnt++;for(var j=0;j<e.t.length;j++)s[e.t[j]].out+=e.a}}
  return s}
function calcDebts(){
  var balances=[];for(var i=0;i<S.players.length;i++){var net=S.players[i].balance-S.players[i].initial;if(Math.abs(net)>0)balances.push({idx:i,net:net})}
  var debtors=[],creditors=[];for(var j=0;j<balances.length;j++){if(balances[j].net<0)debtors.push({idx:balances[j].idx,amt:-balances[j].net});else if(balances[j].net>0)creditors.push({idx:balances[j].idx,amt:balances[j].net})}
  var txs=[],di=0,ci=0;while(di<debtors.length&&ci<creditors.length){var d=debtors[di],c=creditors[ci],amt=Math.min(d.amt,c.amt);txs.push({from:d.idx,to:c.idx,amount:amt});d.amt-=amt;c.amt-=amt;if(d.amt===0)di++;if(c.amt===0)ci++}
  return txs
}

  lines.push('');lines.push('Tổng: '+ff(totBal()+S.pot)+' | '+S.hist.length+' GD | Vòng '+S.round);
  var txt=lines.join('\n');
  function fb(){var ta=document.createElement('textarea');ta.value=txt;ta.style.cssText='position:fixed;opacity:0';document.body.appendChild(ta);ta.focus();ta.select();try{document.execCommand('copy');alert('Đã sao chép!')}catch(xe){alert(txt)}document.body.removeChild(ta)}
  try{if(navigator.clipboard&&window.isSecureContext)navigator.clipboard.writeText(txt).then(function(){alert('Đã sao chép!')}).catch(fb);else fb()}catch(xe){fb()}}

/* ===== SETUP HELPERS ===== */
function setPC(n){while(S.players.length<n)S.players.push({name:'Người chơi '+(S.players.length+1),color:COLS[S.players.length%COLS.length],emoji:'',balance:DBAL,initial:DBAL});while(S.players.length>n)S.players.pop();render()}
function upName(i,v){S.players[i].name=v||('P'+(i+1))}
function upBal(i,v){var n=parseFloat(v)*1000;if(isNaN(n)||n<=0)n=1000;n=Math.round(n/500)*500;S.players[i].initial=n;S.players[i].balance=n;var t=$('totLbl');if(t)t.textContent=ff(totInit())}
function upQD(qi,v){var n=parseFloat(v)*1000;if(!isNaN(n)&&n>0)S.quickDenoms[qi]=Math.round(n/500)*500}
function togglePot(v){S.potEnabled=v;if(!v)S.pot=0;render()}
function upPot(v){var n=parseFloat(v)*1000;if(isNaN(n)||n<0)n=0;S.pot=Math.round(n/500)*500}
function resetDefaults(){for(var i=0;i<S.players.length;i++){S.players[i].name='Người chơi '+(i+1);S.players[i].color=COLS[i%COLS.length];S.players[i].emoji=''}render()}
function splitTotal(){var v=prompt('Nhập tổng tiền cần chia đều (nghìn đồng):','500');if(v===null)return;var t=Math.round(parseFloat(v)*1000);if(isNaN(t)||t<=0)return;var each=Math.floor(t/S.players.length/500)*500;if(each<500)each=500;for(var i=0;i<S.players.length;i++){S.players[i].initial=each;S.players[i].balance=each}render()}
function toggleCompact(){S.compact=!S.compact;render()}
function setHistFilter(i){S.histFilter=i;render()}
function setHistFilterFromSel(v){S.histFilter=parseInt(v,10);renderUhModal()}
function setUhTab(t){uhTab=t;renderUhModal()}
var pcPressTimer=null,pcPressInterval=null;
function adjustPC(dir){var n=S.players.length+dir;if(n<2||n>20)return;setPC(n)}
function pcPressStart(dir){adjustPC(dir);pcPressTimer=setTimeout(function(){pcPressInterval=setInterval(function(){adjustPC(dir)},100)},500)}
function pcPressEnd(){clearTimeout(pcPressTimer);clearInterval(pcPressInterval)}

/* AVATAR PICKER */
var pkFor=-1;
function pickAv(i){
  if(pkFor===i){pkFor=-1;var el=$('pkpnl');if(el)el.innerHTML='';return}
  pkFor=i;var p=S.players[i];
  var h='<div class="pkp"><div class="pk-lbl">Màu sắc</div>';
  h+='<div class="clrs">';
  for(var c=0;c<COLS.length;c++){var cl=COLS[c];h+='<div class="cpd'+(p.color===cl?' on':'')+'" style="background:'+cl+'" onclick="appClr(\''+cl+'\')"></div>'}
  h+='</div>';
  h+='<div class="pk-lbl">Emoji</div>';
  h+='<div class="emjs">';
  for(var e=0;e<EMOJIS.length;e++){var em=EMOJIS[e];h+='<div class="emj'+(p.emoji===em?' on':'')+'" onclick="appEmoji(\''+em+'\')">'+em+'</div>'}
  h+='</div>';
  if(p.emoji)h+='<div onclick="appEmoji(\'\')" style="font-size:11px;color:var(--dim);cursor:pointer;padding:2px 0">&#10005; Xóa emoji</div>';
  h+='</div>';
  var el=$('pkpnl');if(el)el.innerHTML=h}
function appClr(c){if(pkFor>=0){S.players[pkFor].color=c;pickAv(-1);pkFor=-1;render()}}
function appEmoji(em){if(pkFor>=0){S.players[pkFor].emoji=em;pickAv(-1);pkFor=-1;render()}}

function startG(){
  var seen={};
  for(var i=0;i<S.players.length;i++){
    var n=S.players[i].name.trim();
    if(!n){alert('Người chơi '+(i+1)+' chưa có tên!');return}
    if(seen[n]){alert('Tên bị trùng: '+n);return}
    seen[n]=1;S.players[i].name=n}
  S.phase='playing';S.hist=[];S.undoStack=[];S.round=1;S.hidePinned=false;if(S.autoTimerStart){resetTimer();startTimer()}else resetTimer();startTimerTick();render()}

render();
</script>
